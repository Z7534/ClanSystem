# ========================================
# CLANSYSTEM - NACHRICHTEN
# ========================================
# Platzhalter:
# %clan% - Clan-Name
# %player% - Spieler-Name
# %target% - Ziel-Spieler
# %level% - Clan-Level
# %points% - Clan-Punkte
# %rank% - Rang-Name
# %suffix% - Clan-Suffix
# %enemy% - Gegner-Clan
# %ally% - Allianz-Clan
# %count% - Anzahl
# %max% - Maximum
# %time% - Zeit

# Prefix für alle Nachrichten
prefix: "&b&lClanSystem &8>> &r"

# Allgemeine Nachrichten
general:
  no-permission: "&cDu hast keine Berechtigung für diesen Befehl!"
  player-only: "&cDieser Befehl kann nur von Spielern ausgeführt werden!"
  player-not-found: "&cDer Spieler &e%player% &cwurde nicht gefunden!"
  invalid-usage: "&cFalsche Verwendung! Nutze: &e%usage%"
  cooldown: "&cDu musst noch &e%time% &cwarten!"
  reload-success: "&aKonfiguration wurde neu geladen!"

