  # Nicht gefunden
  not-found: "&cDer Clan &e%clan% &cwurde nicht gefunden!"
  not-in-clan: "&cDu bist in keinem Clan!"
  target-not-in-clan: "&c%player% ist in keinem Clan!"
  target-not-in-your-clan: "&c%player% ist nicht in deinem Clan!"

# Rang-Nachrichten
rank:
  set: "&aDer Rang von &e%player% &awurde auf &e%rank% &agesetzt."
