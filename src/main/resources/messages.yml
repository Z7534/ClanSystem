  warps: "&8&l✦ &5Clan-Warps"
  confirm: "&8&l⚠ &7Bestätigung"
  suffix-edit: "&8&l✦ &7Suffix bearbeiten"
  icon-picker: "&8&l✦ &7Icon auswählen"

