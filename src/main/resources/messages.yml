  name-taken: "&cDieser Clan-Name ist bereits vergeben!"
  name-too-short: "&cDer Clan-Name ist zu kurz! (Min. %count% Zeichen)"
  name-too-long: "&cDer Clan-Name ist zu lang! (Max. %count% Zeichen)"
  name-invalid: "&cDer Clan-Name enthält ungültige Zeichen!"
  create-cooldown: "&cDu musst noch &e%time% &cwarten, bevor du einen neuen Clan erstellen kannst!"

  # Beitreten
  joined: "&aDu bist dem Clan &e%clan% &abeigetreten!"
  member-joined: "&e%player% &7ist dem Clan beigetreten!"
  not-open: "&cDieser Clan nimmt keine offenen Beitritte an!"
  clan-full: "&cDieser Clan ist voll! (%count%/%max%)"

  # Einladungen
  invited: "&aDu hast &e%player% &ain deinen Clan eingeladen!"
  invite-received: "&aDu wurdest von &e%player% &ain den Clan &e%clan% &aeingeladen!"
  invite-accept: "&7Klicke hier oder nutze &e/clan accept &7zum Annehmen."
  invite-accepted: "&aDu hast die Einladung angenommen!"
  invite-expired: "&cDie Einladung ist abgelaufen!"
  already-invited: "&cDieser Spieler wurde bereits eingeladen!"
  no-pending-invite: "&cDu hast keine ausstehende Einladung!"

  # Bewerbungen
