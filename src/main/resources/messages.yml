# Broadcast-Nachrichten
# HINWEIS: Nur clan-created, clan-disbanded, member-joined und member-left sind
# WIRKLICH serverweit (siehe config.yml/broadcasts). Die übrigen Schlüssel hier
# (member-kicked, level-up, alliance-*, war-*) werden trotz des Namens "broadcast"
# NICHT mehr serverweit verschickt, sondern nur noch clan-intern an die jeweils
# betroffenen Clans (siehe WarManager/AllianceManager/ClanManager/ClanCommand).
broadcast:
  clan-created: "&6Der Clan &e%clan% &6wurde von &e%player% &6gegründet!"
  clan-disbanded: "&7Der Clan &e%clan% &7wurde aufgelöst."
  member-joined: "&e%player% &7ist dem Clan &e%clan% &7beigetreten."
  member-left: "&e%player% &7hat den Clan &e%clan% &7verlassen."
  member-kicked: "&e%player% &7wurde aus dem Clan &e%clan% &7gekickt."
  level-up: "&6Der Clan &e%clan% &6hat Level &e%level% &6erreicht!"
  alliance-formed: "&aDie Clans &e%clan% &aund &e%ally% &ahaben eine Allianz geschlossen!"
  alliance-broken: "&7Die Allianz zwischen &e%clan% &7und &e%ally% &7wurde aufgelöst."
  war-declared: "&c&lKRIEG! &e%clan% &chat &e%enemy% &cden Krieg erklärt!"
  war-ended: "&7Der Krieg zwischen &e%clan% &7und &e%enemy% &7ist beendet. Sieger: &e%winner%"

