  member-left: "&e%player% &7hat den Clan verlassen."
  cannot-leave-leader: "&cAls Leader musst du zuerst einen Nachfolger bestimmen oder den Clan auflösen!"

  # Kicken
  kicked: "&cDu wurdest aus dem Clan &e%clan% &cgekickt!"
  kicked-by: "&e%player% &7wurde von &e%target% &7aus dem Clan gekickt."
  cannot-kick-self: "&cDu kannst dich nicht selbst kicken!"
  cannot-kick-higher: "&cDu kannst keine Spieler mit höherem Rang kicken!"

  # Auflösen
  disbanded: "&7Der Clan &e%clan% &7wurde aufgelöst."
