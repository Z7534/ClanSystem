# ========================================
# CLANSYSTEM - LEVEL-KONFIGURATION
# ========================================
# Jedes Level hat:
# - points-required: Punkte die für dieses Level benötigt werden
# - rewards: Belohnungen die beim Erreichen ZUSÄTZLICH gewährt werden
#
# Belohnungen sind ADDITIV - sie werden zum bestehenden Wert hinzugefügt!
# Beispiel: Level 1 hat max-members: 10, Level 2 gibt +5 dazu = 15 Mitglieder
#
# ICONS: "icon" (unter base-values UND unter rewards) legt fest, welches
# Clan-Icon ab diesem Level zusätzlich im Icon-Picker (Clan-Einstellungen)
# auswählbar wird. Muss ein gültiger Minecraft-Material-Name sein
# (https://hub.spigotmc.org/javadocs/spigot/org/bukkit/Material.html).
# Lässt man "icon" bei einem Level einfach weg, gibt es dort keine neue
# Icon-Freischaltung. So lässt sich frei einstellen, wie viele/welche Icons
# es gibt und ab welchem Level sie freigeschaltet werden.

# Startwerte (Level 0 / neuer Clan)
# HINWEIS: max-homes wird ignoriert - es gibt IMMER nur 1 Home pro Clan,
# unabhängig vom Level (siehe LevelManager#getMaxHomes).
base-values:
  max-members: 15
  max-homes: 1
  max-warps: 3
  chest-rows: 3  # 3 Reihen
  icon: COAL_BLOCK

# Level-Definitionen
levels:
  1:
    points-required: 0
    rewards:
      max-members: 0      # +0 (bleibt bei 15)
      max-warps: 0        # +0 (bleibt bei 3)
      chest-rows: 0       # +0 (bleibt bei 3)

  2:
    points-required: 100
    rewards:
      max-members: 5      # +5 (jetzt 15)
      max-warps: 2        # +1 (jetzt 5)
      chest-rows: 1       # +1 (jetzt 4 Reihen)
      icon: COPPER_BLOCK

  3:
    points-required: 600
    rewards:
      max-members: 5      # +5 (jetzt 20)
      max-warps: 2        # +1 (jetzt 7)
      chest-rows: 1       # +1 (jetzt 5 Reihen)
      icon: IRON_BLOCK

  4:
    points-required: 1000
    rewards:
      max-members: 5      # +5 (jetzt 25)
      max-warps: 1        # +2 (jetzt 9)
      chest-rows: 1       # +1 (jetzt 6 Reihen)
      icon: GOLD_BLOCK

  5:
    points-required: 1500
    rewards:
      max-members: 5     # +5 (jetzt 30)
      max-warps: 1        # +1 (jetzt 10)
      icon: EMERALD_BLOCK

  6:
    points-required: 2000
    rewards:
      max-members: 10
      max-warps: 2
      icon: AMETHYST_BLOCK

  7:
    points-required: 2600
    rewards:
      max-members: 10
      max-warps: 2
      icon: DIAMOND_BLOCK

  8:
    points-required: 3400
    rewards:
      max-members: 10
      max-warps: 2
      icon: NETHERITE_BLOCK